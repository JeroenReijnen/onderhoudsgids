<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uw Onderhoudsgids</title>
<style>
:root{--cr:#faf8f4;--wh:#fff;--gr:#f2efe9;--bd:#e0dbd2;--bd2:#ede9e2;--tx:#1c1a17;--tx2:#6b6357;--tx3:#b0a898;--gn:#1a5c38;--gnm:#2a7a4e;--gnl:#e8f5ed;--gnb:#b8d8c4;--bl:#1a3d6b;--blm:#2358a0;--bll:#e8f0fb;--blb:#b0c8f0;--or:#7a3a00;--orl:#fff3e8;--orb:#f0c898;--rd:#8a1a1a;--rdl:#fdeaea;--rdb:#f0b8b8;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cr);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.65}
.hdr{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.logo{font-size:19px;font-weight:700;letter-spacing:-.02em}
.back-btn{font-size:13px;font-weight:500;background:var(--tx);color:#fff;border:none;padding:7px 16px;border-radius:20px;cursor:pointer;display:none}
/* onboarding */
.onb{max-width:700px;margin:0 auto;padding:56px 24px 40px;text-align:center}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:14px}
.hero{font-size:32px;font-weight:300;line-height:1.2;letter-spacing:-.02em;margin-bottom:10px}
.hero em{font-style:italic;color:var(--gnm)}
.hero-sub{font-size:15px;color:var(--tx2);margin-bottom:36px;max-width:440px;margin-left:auto;margin-right:auto}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:28px;text-align:left}
.tc{background:var(--wh);border:2px solid var(--bd);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.tc:hover{border-color:var(--tx3);box-shadow:0 2px 12px rgba(0,0,0,.07)}
.tc.sel{border-color:var(--gnm);background:var(--gnl)}
.tc.sel::after{content:'✓';position:absolute;top:9px;right:11px;width:20px;height:20px;background:var(--gnm);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:20px;text-align:center}
.tc-em{font-size:26px;margin-bottom:7px;display:block}
.tc-name{font-size:13px;font-weight:600;color:var(--tx)}
.tc-brand{font-size:11px;color:var(--tx3);margin-top:2px}
.cta{background:var(--gnm);color:#fff;border:none;padding:13px 34px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(42,122,78,.28)}
.cta:hover{background:var(--gn)}
.cta:disabled{background:var(--tx3);box-shadow:none;cursor:not-allowed}
/* guide */
.guide{display:none}
.guide.on{display:block}
.gnav{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.gt{padding:13px 14px;font-size:13px;font-weight:500;color:var(--tx2);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .13s;margin-bottom:-1px}
.gt:hover{color:var(--tx)}
.gt.on{color:var(--gnm);border-bottom-color:var(--gnm)}
.page{display:none;padding:36px 28px;max-width:820px;margin:0 auto}
.page.on{display:block}
.page-em{font-size:44px;margin-bottom:10px;display:block}
.page-title{font-size:26px;font-weight:300;letter-spacing:-.02em;margin-bottom:5px}
.page-intro{font-size:14.5px;color:var(--tx2);max-width:540px;margin-bottom:24px}
/* inverter picker */
.inv-pick-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:14px;text-align:center}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:8px}
.inv-card{background:var(--wh);border:2px solid var(--bd);border-radius:var(--r);padding:16px 14px;cursor:pointer;transition:all .15s}
.inv-card:hover{border-color:var(--gnm);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.inv-card-name{font-size:13.5px;font-weight:600;color:var(--tx);margin-bottom:3px}
.inv-card-brand{font-size:11px;color:var(--tx3);margin-bottom:6px}
.inv-card-desc{font-size:12px;color:var(--tx2);line-height:1.45}
.inv-hint{font-size:12px;color:var(--tx3);text-align:center;margin-top:8px;font-style:italic}
.back-inv{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx2);cursor:pointer;margin-bottom:18px;padding:5px 10px;border:1px solid var(--bd);border-radius:20px;background:var(--wh)}
.back-inv:hover{border-color:var(--tx3);color:var(--tx)}
/* warnings */
.warn{display:flex;gap:11px;align-items:flex-start;padding:13px 16px;border-radius:var(--r);margin-bottom:14px;font-size:13.5px;border:1px solid}
.warn-red{background:var(--rdl);border-color:var(--rdb);color:var(--rd)}
.warn-orange{background:var(--orl);border-color:var(--orb);color:var(--or)}
.warn-icon{font-size:16px;flex-shrink:0;margin-top:1px}
/* blocks */
.block{margin-bottom:24px;border-radius:var(--r);overflow:hidden;border:1px solid}
.block-diy{border-color:var(--gnb)}
.block-pro{border-color:var(--blb)}
.block-head{display:flex;align-items:center;gap:12px;padding:13px 18px;color:#fff}
.block-diy .block-head{background:var(--gnm)}
.block-pro .block-head{background:var(--blm)}
.bh-icon{font-size:19px}
.bh-title{font-size:14px;font-weight:600}
.bh-sub{font-size:11.5px;opacity:.78;margin-top:1px}
.block-body{background:var(--wh)}
/* diy tasks */
.task{border-bottom:1px solid var(--bd2)}
.task:last-child{border-bottom:none}
.task-hd{display:flex;align-items:flex-start;gap:12px;padding:15px 18px;cursor:pointer}
.task-hd:hover{background:var(--gr)}
.freq{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.f-m{background:var(--bll);color:var(--bl)}
.f-k{background:var(--orl);color:var(--or)}
.f-j{background:var(--gnl);color:var(--gn)}
.f-c{background:var(--rdl);color:var(--rd)}
.task-title{font-size:14px;font-weight:500;line-height:1.4}
.task-short{font-size:12.5px;color:var(--tx2);margin-top:3px}
.chev{margin-left:auto;font-size:13px;color:var(--tx3);transition:transform .2s;flex-shrink:0;margin-top:3px}
.task.open .chev{transform:rotate(180deg)}
.task-det{display:none;padding:0 18px 18px;background:var(--gr);border-top:1px solid var(--bd2)}
.task.open .task-det{display:block}
.steps-lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--gn);margin:14px 0 9px}
.steps{list-style:none;padding:0}
.steps li{display:flex;gap:9px;margin-bottom:7px;font-size:13.5px;color:var(--tx2);line-height:1.5;align-items:flex-start}
.steps li::before{content:attr(data-n);flex-shrink:0;width:20px;height:20px;background:var(--gnm);color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
.tip{background:var(--wh);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-top:10px}
.tip-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.tip-lbl.green{color:var(--gn)}.tip-lbl.orange{color:var(--or)}.tip-lbl.red{color:var(--rd)}.tip-lbl.blue{color:var(--bl)}
.tip-body{font-size:13px;color:var(--tx2);line-height:1.6}
.tip-body strong{color:var(--tx)}
/* pro tasks */
.pro-item{display:flex;gap:12px;align-items:flex-start;padding:14px 18px;border-bottom:1px solid var(--bd2)}
.pro-item:last-child{border-bottom:none}
.pro-dot{width:8px;height:8px;border-radius:50%;background:var(--blm);flex-shrink:0;margin-top:6px}
.pro-title{font-size:13.5px;font-weight:500;color:var(--tx);line-height:1.4}
.pro-why{font-size:12px;color:var(--tx2);margin-top:3px;font-style:italic}
.pro-wet{display:inline-block;margin-top:5px;font-size:10px;font-weight:600;background:var(--bll);color:var(--bl);border:1px solid var(--blb);border-radius:20px;padding:2px 8px}
.pro-freq{flex-shrink:0;font-size:11px;color:var(--tx3);white-space:nowrap;padding-top:3px}
.footer-cta{margin-top:24px;padding:18px 22px;background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);text-align:center}
.footer-cta p:first-child{font-size:17px;font-weight:300;margin-bottom:5px}
.footer-cta p:last-child{font-size:13px;color:var(--tx2)}
/* AI */
.ai-fab{position:fixed;bottom:22px;right:22px;z-index:500}
.ai-btn{width:52px;height:52px;border-radius:50%;background:var(--tx);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center}
.ai-panel{position:fixed;bottom:84px;right:22px;z-index:500;width:340px;background:var(--wh);border:1px solid var(--bd);border-radius:14px;box-shadow:0 6px 28px rgba(0,0,0,.1);display:none;flex-direction:column;max-height:460px;overflow:hidden}
.ai-panel.on{display:flex}
.ai-ph{padding:13px 16px;background:var(--tx);color:#fff;display:flex;align-items:center;justify-content:space-between}
.ai-ph-t{font-size:14px;font-weight:600}
.ai-ph-s{font-size:11px;color:#888;margin-top:1px}
.ai-x{background:none;border:none;color:#888;font-size:17px;cursor:pointer}
.ai-msgs{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:10px}
.ai-bub{max-width:90%;padding:9px 13px;border-radius:10px;font-size:13px;line-height:1.6}
.ai-bub.bot{background:var(--gr);border:1px solid var(--bd);align-self:flex-start;border-radius:3px 10px 10px 10px}
.ai-bub.usr{background:var(--tx);color:#fff;align-self:flex-end;border-radius:10px 3px 10px 10px}
.ai-bub strong{color:var(--gnm)}
.ai-bub ul{padding-left:13px;margin-top:3px}
.ai-quick{padding:7px 13px;display:flex;flex-wrap:wrap;gap:5px;border-top:1px solid var(--bd2)}
.ai-qb{font-size:11.5px;padding:5px 10px;border-radius:20px;background:var(--cr);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;font-family:inherit}
.ai-qb:hover{border-color:var(--tx3);color:var(--tx)}
.ai-row{padding:10px 12px;border-top:1px solid var(--bd2);display:flex;gap:7px}
.ai-inp{flex:1;border:1px solid var(--bd);border-radius:7px;padding:7px 11px;font-family:inherit;font-size:13px;color:var(--tx);background:var(--cr);outline:none}
.ai-inp:focus{border-color:var(--gnm)}
.ai-go{background:var(--gnm);border:none;border-radius:7px;width:34px;color:#fff;font-size:15px;cursor:pointer}
.dots{display:flex;gap:3px;align-items:center}
.dots span{width:6px;height:6px;background:var(--tx3);border-radius:50%;animation:d 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes d{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
@media(max-width:580px){.tgrid{grid-template-columns:1fr 1fr}.hero{font-size:24px}.page{padding:24px 16px}.ai-panel{width:calc(100vw - 28px);right:14px}}
</style>
</head>
<body>
<div class="hdr">
  <span class="logo">Uw installateur</span>
  <button class="back-btn" id="back-btn" onclick="goBack()">← Mijn installaties</button>
</div>

<div id="onb">
  <div class="onb">
    <p class="eyebrow">Uw persoonlijke onderhoudsgids</p>
    <h1 class="hero">Wat heeft uw installateur bij u <em>geïnstalleerd?</em></h1>
    <p class="hero-sub">Selecteer uw installaties en ontvang een onderhoudsgids op maat.</p>
    <div class="tgrid" id="tgrid"></div>
    <button class="cta" id="start-btn" disabled onclick="start()">Toon mijn onderhoudsgids →</button>
  </div>
</div>

<div class="guide" id="guide">
  <nav class="gnav" id="gnav"></nav>
  <div id="pages"></div>
</div>

<div class="ai-fab">
  <div class="ai-panel" id="ai-panel">
    <div class="ai-ph">
      <div><div class="ai-ph-t">✦ AI-assistent</div><div class="ai-ph-s">Stel uw vraag in gewone taal</div></div>
      <button class="ai-x" onclick="toggleAI()">✕</button>
    </div>
    <div class="ai-msgs" id="ai-msgs"><div class="ai-bub bot">Hallo! Heeft u een vraag over het onderhoud van uw installatie?</div></div>
    <div class="ai-quick" id="ai-quick">
      <button class="ai-qb" onclick="qsend(this)">Hoe reinig ik mijn filter?</button>
      <button class="ai-qb" onclick="qsend(this)">Wat is normale waterdruk?</button>
      <button class="ai-qb" onclick="qsend(this)">Ik zie een foutcode</button>
    </div>
    <div class="ai-row">
      <input class="ai-inp" id="ai-inp" placeholder="Typ uw vraag..." onkeydown="if(event.key==='Enter')sendAI()">
      <button class="ai-go" onclick="sendAI()">→</button>
    </div>
  </div>
  <button class="ai-btn" onclick="toggleAI()">✦</button>
</div>

             {l:'Te lage druk?', cl:'orange', tx:'Luchtinsluiting beschadigt de circulatiepomp. Een lek laat kostbare collectievloeistof ontsnappen.'}]}
    ]},
    pro:{title:'Dit doet uw installateur voor u', sub:'Jaarlijkse technische inspectie', tasks:[
      {title:'Veiligheidsventiel testen', freq:'1x per jaar', why:'Een defect ventiel kan bij overkoken gevaarlijk zijn.', wet:''},
      {title:'Collector en bevestigingen inspecteren', freq:'1x per jaar', why:'Gebarsten glas op het dak vereist veilige inspectie.', wet:''},
      {title:'Glycol analyseren op pH en vriesgedrag', freq:'Elke 2-3 jaar', why:'Gecorrodeerde vloeistof vernietigt leidingen en collector.', wet:''},
      {title:'Expansievat voor-spanning controleren', freq:'1x per jaar', why:'Onjuiste voor-spanning veroorzaakt drukverlies en pompschade.', wet:''},
      {title:'Boiler anode inspecteren', freq:'1x per jaar', why:'Beschermt de binnenzijde van uw boiler tegen corrosie.', wet:''}
    ]}
  }
};

// ── RENDER HELPERS ────────────────────────────────────────────────────────────

function renderPage(pageId) {
  var d = PAGES[pageId];
  if (!d) return '<p>Pagina niet gevonden.</p>';

  var wHtml = '';
  for (var i = 0; i < d.warns.length; i++) {
    var w = d.warns[i];
    wHtml += '<div class="warn warn-' + w.t + '"><span class="warn-icon">' + w.ic + '</span><span>' + w.tx + '</span></div>';
  }

  var ic = {green:'✓', orange:'⚠', red:'⛔', blue:'💡'};
  var diyHtml = '';
  for (var ti = 0; ti < d.diy.tasks.length; ti++) {
    var t = d.diy.tasks[ti];
    var stepsHtml = '';
    for (var si = 0; si < t.steps.length; si++) {
      stepsHtml += '<li data-n="' + (si+1) + '">' + t.steps[si] + '</li>';
    }
    var tipsHtml = '';
    for (var tpi = 0; tpi < (t.tips||[]).length; tpi++) {
      var tp = t.tips[tpi];
      tipsHtml += '<div class="tip"><div class="tip-lbl ' + tp.cl + '">' + (ic[tp.cl]||'💡') + ' ' + tp.l + '</div><div class="tip-body">' + tp.tx + '</div></div>';
    }
    var taskKey = pageId + '_' + ti;
    diyHtml += '<div class="task" id="task_' + taskKey + '">' +
      '<div class="task-hd" onclick="togTask(\'' + taskKey + '\')">' +
        '<span class="freq ' + t.fc + '">' + t.freq + '</span>' +
        '<div><div class="task-title">' + t.title + '</div><div class="task-short">' + t.short + '</div></div>' +
        '<span class="chev">▾</span>' +
      '</div>' +
      '<div class="task-det">' +
        '<div class="steps-lbl">✓ Stap voor stap</div>' +
        '<ul class="steps">' + stepsHtml + '</ul>' +
        tipsHtml +
      '</div>' +
    '</div>';
  }

  var proHtml = '';
  for (var pi = 0; pi < d.pro.tasks.length; pi++) {
    var pt = d.pro.tasks[pi];
    proHtml += '<div class="pro-item">' +
      '<div class="pro-dot"></div>' +
      '<div>' +
        '<div class="pro-title">' + pt.title + '</div>' +
        '<div class="pro-why">' + pt.why + '</div>' +
        (pt.wet ? '<span class="pro-wet">' + pt.wet + '</span>' : '') +
      '</div>' +
      '<div class="pro-freq">' + pt.freq + '</div>' +
    '</div>';
  }

  return '<span class="page-em">' + d.em + '</span>' +
    '<h2 class="page-title">' + d.name + '</h2>' +
    '<p class="page-intro">' + d.intro + '</p>' +
    wHtml +
    '<div class="block block-diy">' +
      '<div class="block-head"><span class="bh-icon">🙋</span><div><div class="bh-title">' + d.diy.title + '</div><div class="bh-sub">' + d.diy.sub + '</div></div></div>' +
      '<div class="block-body">' + diyHtml + '</div>' +
    '</div>' +
    '<div class="block block-pro">' +
      '<div class="block-head"><span class="bh-icon">🔧</span><div><div class="bh-title">' + d.pro.title + '</div><div class="bh-sub">' + d.pro.sub + '</div></div></div>' +
      '<div class="block-body">' + proHtml + '</div>' +
    '</div>' +
    '<div class="footer-cta"><p>Vragen of een onderhoudsbezoek plannen?</p><p>Uw installateur staat voor u klaar — gebruik de AI-knop rechtsonder ✦</p></div>';
}

function renderInverterPicker() {
  var cardsHtml = '';
  for (var i = 0; i < INVERTERS.length; i++) {
    var inv = INVERTERS[i];
    cardsHtml += '<div class="inv-card" data-inv="' + inv.id + '">' +
      '<div class="inv-card-name">' + inv.name + '</div>' +
      '<div class="inv-card-brand">' + inv.brand + '</div>' +
      '<div class="inv-card-desc">' + inv.desc + '</div>' +
    '</div>';
  }
  return '<span class="page-em">☀️</span>' +
    '<h2 class="page-title">Zonnepanelen</h2>' +
    '<p class="page-intro" style="margin-bottom:24px">Welk type omvormer heeft u? Kijk op het kastje in uw meterkast of technische ruimte.</p>' +
    '<div class="inv-pick-title">Kies uw omvormer-type</div>' +
    '<div class="inv-grid" onclick="handleInvClick(event)">' + cardsHtml + '</div>' +
    '<p class="inv-hint">Weet u het niet zeker? Uw installateur staat u graag te woord ✦</p>';
}

function renderInverterDetail(invId) {
  return '<button class="back-inv" onclick="showInverterPicker()">← Terug naar omvormer keuze</button>' +
    renderPage(invId);
}

// ── STATE & NAV ───────────────────────────────────────────────────────────────

var sel = [];
var aiOpen = false;
var aiHist = [];
var aiLoad = false;

// Build onboarding grid
(function() {
  var grid = document.getElementById('tgrid');
  var html = '';
  for (var i = 0; i < TECHS.length; i++) {
    var t = TECHS[i];
    html += '<div class="tc" data-id="' + t.id + '" onclick="pickTech(this)">' +
      '<span class="tc-em">' + t.em + '</span>' +
      '<div class="tc-name">' + t.name + '</div>' +
      '<div class="tc-brand">' + t.brand + '</div>' +
    '</div>';
  }
  grid.innerHTML = html;
})();

function pickTech(el) {
  var id = el.getAttribute('data-id');
  var idx = sel.indexOf(id);
  if (idx >= 0) {
    sel.splice(idx, 1);
    el.classList.remove('sel');
  } else {
    sel.push(id);
    el.classList.add('sel');
  }
  document.getElementById('start-btn').disabled = sel.length === 0;
}

function start() {
  document.getElementById('onb').style.display = 'none';
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('guide').classList.add('on');

  // Build nav tabs
  var navHtml = '';
  for (var i = 0; i < sel.length; i++) {
    var tech = null;
    for (var j = 0; j < TECHS.length; j++) {
      if (TECHS[j].id === sel[i]) { tech = TECHS[j]; break; }
    }
    if (tech) {
      navHtml += '<div class="gt' + (i===0?' on':'') + '" id="nt_' + tech.id + '" onclick="switchPage(\'' + tech.id + '\')">' + tech.em + ' ' + tech.name + '</div>';
    }
  }
  document.getElementById('gnav').innerHTML = navHtml;

  // Build pages
  var pagesHtml = '';
  for (var i = 0; i < sel.length; i++) {
    var id = sel[i];
    var tech = null;
    for (var j = 0; j < TECHS.length; j++) {
      if (TECHS[j].id === id) { tech = TECHS[j]; break; }
    }
    if (!tech) continue;
    var content = tech.inverterPick ? renderInverterPicker() : renderPage(id);
    pagesHtml += '<div class="page' + (i===0?' on':'') + '" id="pg_' + id + '">' + content + '</div>';
  }
  document.getElementById('pages').innerHTML = pagesHtml;
}

function goBack() {
  document.getElementById('onb').style.display = 'block';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('guide').classList.remove('on');
}

function switchPage(id) {
  document.querySelectorAll('.gt').forEach(function(e) { e.classList.remove('on'); });
  document.querySelectorAll('.page').forEach(function(e) { e.classList.remove('on'); });
  var nt = document.getElementById('nt_' + id);
  var pg = document.getElementById('pg_' + id);
  if (nt) nt.classList.add('on');
  if (pg) { pg.classList.add('on'); window.scrollTo({top:0, behavior:'smooth'}); }
}

function handleInvClick(e) {
  var card = e.target.closest('.inv-card');
  if (card) pickInverter(card.getAttribute('data-inv'));
}

function pickInverter(invId) {
  var pg = document.getElementById('pg_zon');
  if (pg) pg.innerHTML = renderInverterDetail(invId);
}

function showInverterPicker() {
  var pg = document.getElementById('pg_zon');
  if (pg) pg.innerHTML = renderInverterPicker();
}

function togTask(key) {
  var el = document.getElementById('task_' + key);
  if (el) el.classList.toggle('open');
}

// ── AI ────────────────────────────────────────────────────────────────────────
var SYS = 'Je bent de vriendelijke klantenassistent van een Belgisch installatiebedrijf. Je spreekt met een eindklant. Gebruik begrijpelijke taal, geen vakjargon. Beantwoord vragen over onderhoud van zonnepanelen, thuisbatterijen, laadpalen, warmtepompen, ventilatiesystemen en zonneboilers. Sluit af: bij twijfel altijd uw installateur contacteren. Max 200 woorden. Antwoord in het Nederlands.';

function toggleAI() {
  aiOpen = !aiOpen;
  document.getElementById('ai-panel').classList.toggle('on', aiOpen);
  if (aiOpen) setTimeout(function() { document.getElementById('ai-inp').focus(); }, 80);
}

function addb(role, html) {
  var c = document.getElementById('ai-msgs');
  var d = document.createElement('div');
  d.className = 'ai-bub ' + role;
  d.innerHTML = html;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  return d;
}

async function sendAI() {
  if (aiLoad) return;
  var inp = document.getElementById('ai-inp');
  var txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  document.getElementById('ai-quick').style.display = 'none';
  addb('usr', txt);
  aiHist.push({role:'user', content:txt});
  aiLoad = true;
  var typ = addb('bot', '<div class="dots"><span></span><span></span><span></span></div>');
  try {
    var r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:1000, system:SYS, messages:aiHist})
    });
    var data = await r.json();
    var reply = (data.content && data.content[0]) ? data.content[0].text : 'Geen antwoord ontvangen.';
    aiHist.push({role:'assistant', content:reply});
    typ.innerHTML = reply
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/gs, function(m) { return '<ul>' + m + '</ul>'; })
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
  } catch(e) {
    typ.innerHTML = 'Verbindingsprobleem. Probeer het later opnieuw.';
  }
  aiLoad = false;
}

function qsend(btn) {
  document.getElementById('ai-inp').value = btn.textContent;
  sendAI();
}
</script>
